<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Account</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial;
    }

    body {
      background: #f4f6fb;
    }

    .login-container {
      display: flex;
      height: 100vh;
      min-height: 500px;
    }

    .login-sidebar {
      width: 230px;
      background: #ffffff;
      border-right: 1px solid #e6e6e6;
      padding: 30px 20px;
      display: flex;
      flex-direction: column;
    }

    .logo {
      padding-bottom: 20px;
      font-size: 18px;
      color: #8A05BE;
      font-weight: bold;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: #e6e6e6;
      margin-bottom: 20px;
    }

    .sidebar-tagline {
      font-size: 13px;
      color: #aaa;
      margin-top: auto;
    }

    .login-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .login-card {
      background: #fff;
      border-radius: 20px;
      padding: 45px 40px;
      width: 100%;
      max-width: 420px;
      border: 1px solid #e6e6e6;
    }

    .login-card h1 {
      font-size: 26px;
      color: #333;
      margin-bottom: 6px;
    }

    .login-card h1 span {
      color: #8A05BE;
    }

    .login-card > p {
      color: #777;
      font-size: 14px;
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #555;
      margin-bottom: 7px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 15px;
      border: 1px solid #e6e6e6;
      border-radius: 10px;
      font-size: 14px;
      color: #333;
      outline: none;
      transition: border-color 0.2s;
      background: #fff;
    }

    .form-group input:focus {
      border-color: #8A05BE;
    }

    .btn-register {
      width: 100%;
      padding: 13px;
      background: #8A05BE;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 8px;
    }

    .btn-register:hover {
      background: #6a0392;
      transform: translateY(-1px);
    }

    .login-text {
      text-align: center;
      margin-top: 22px;
      font-size: 13px;
      color: #777;
    }

    .login-text a {
      color: #8A05BE;
      text-decoration: none;
      font-weight: 500;
    }

    .login-text a:hover {
      text-decoration: underline;
    }

    .terms {
      font-size: 12px;
      color: #aaa;
      text-align: center;
      margin-top: 16px;
    }

    .terms a {
      color: #8A05BE;
      text-decoration: none;
    }

    .terms a:hover {
      text-decoration: underline;
    }

    @media (max-width: 900px) {
      .login-container {
        flex-direction: column;
      }

      .login-sidebar {
        width: 100%;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
        padding: 10px 20px;
      }

      .sidebar-tagline {
        margin-top: 0;
      }

      .divider {
        display: none;
      }

      .login-main {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">

    <div class="login-sidebar">
      <div class="logo">📈 Investify</div>
      <div class="divider"></div>
      <p class="sidebar-tagline">Track your portfolio smarter.</p>
    </div>

    <div class="login-main">
      <div class="login-card">
        <h1>Create an <span>account</span></h1>
        <p>Start tracking your investments today</p>

        <div class="form-group">
          <label for="name">Full name</label>
          <input type="text" id="name"/>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password"/>
        </div>

        <div class="form-group">
          <label for="confirm">Confirm password</label>
          <input type="password" id="confirm"/>
        </div>

        <button class="btn-register">Create account</button>

        <p class="terms">
          By signing up you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>
        </p>

        <p class="login-text">
          Already have an account? <a href="#">Sign in</a>
        </p>
      </div>
    </div>

  </div>
</body>
</html>
