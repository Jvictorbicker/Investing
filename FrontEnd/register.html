<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Criar conta — Investify</title>
  <link rel="stylesheet" href="assets/css/style.css"/>
  <link rel="stylesheet" href="assets/css/auth.css"/>
</head>
<body>
  <div class="login-container">
    <div class="login-sidebar">
      <div class="logo">Investify</div>
      <div class="divider"></div>
      <p class="sidebar-tagline">Organize seu portifolio de maneira inteligente.</p>
    </div>

    <div class="login-main">
      <div class="login-card">
        <h1>Criar <span>conta</span></h1>
        <p>Comece a acompanhar seus investimentos hoje</p>

        <div id="erro" class="erro" style="display:none"></div>

        <div class="form-group">
          <label for="nome">Nome completo</label>
          <input type="text" id="nome"/>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email"/>
        </div>

        <div class="form-group">
          <label for="password">Senha</label>
          <input type="password" id="password"/>
        </div>

        <div class="form-group">
          <label for="confirm">Confirmar senha</label>
          <input type="password" id="confirm"/>
        </div>

        <button class="btn-login" onclick="register()">Criar conta</button>

        <p class="signup-text">
          Já tem conta? <a href="login.html">Entrar</a>
        </p>
      </div>
    </div>
  </div>

  <script>
    const API = "http://localhost:5227/api";

    async function register() {
      const nome = document.getElementById("nome").value;
      const email = document.getElementById("email").value;
      const senha = document.getElementById("password").value;
      const confirm = document.getElementById("confirm").value;
      const erro = document.getElementById("erro");

      if (senha !== confirm) {
        erro.textContent = "As senhas não coincidem.";
        erro.style.display = "block";
        return;
      }

      const res = await fetch(`${API}/auth/register`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "include",
        body: JSON.stringify({ nome, email, senha })
      });

      if (res.ok) {
        window.location.href = "index.html";
      } else {
        const data = await res.json();
        erro.textContent = data[0]?.description || "Erro ao criar conta.";
        erro.style.display = "block";
      }
    }
  </script>
</body>
</html>
