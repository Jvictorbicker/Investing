<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Inventory investing</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

<div class="container">

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <div class="logo">
            <h2>INVESTING<br>INVENTORY</h2>
        </div>

        <div class="divider"></div>

        <nav>
            <a class="active">Carteira</a>
            <a>Rendimentos</a>
            <a>Minha conta</a>
        </nav>

    </aside>

    <!-- MAIN -->
    <main class="main">

        <header class="header">
            <h1>Minha <span>Carteira</span></h1>
            <p></p>
        </header>

        <section class="dashboard">

            <div class="production">
                <h2>Seus <span>Investimentos</span></h2>

                <div class="cards">

                    <div class="card">
                        <h3>FIQE3 Unifique</h3>
                        <p>2 unid.</p>
                        <strong>R$ 4,60</strong>

                        <div class="btn-group">
                            <button>Comprar</button>
                            <button>Vender</button>
                        </div>
                    </div>

                    <div class="card add-card">
                        <button class="big-add">+</button>
                    </div>

                </div>

            </div>

            <div class="stats">

                <div class="stat-card">
                    <p>Total em Bolsa de Valores</p>
                    <h2>R$ 260.400</h2>
                </div>

            </div>

        </section>

    </main>

</div>

</body>
</html>
