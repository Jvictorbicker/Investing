<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Inventory investing</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div class="container">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">
      <h2>Investify</h2>
    </div>

    <div class="divider"></div>

    <nav>
      <a data-page="carteira" class="active">Carteira</a>
      <a data-page="rendimentos">Rendimentos</a>
      <a data-page="conta">Minha conta</a>
    </nav>

    <!-- usuário logado -->
    <div class="sidebar-user">
  <div class="sidebar-profile">
    <img id="profile-pic" src="assets/img/image2323.png" style="width:38px;height:38px;border-radius:50%;object-fit:cover;"/>
    <span id="usuario-nome"></span>
  </div>
  <button id="btn-logout">Sair</button>
</div>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- CARTEIRA -->
    <section id="carteira" class="page active">
      <header class="header">
        <h1>Minha <span>Carteira</span></h1>
      </header>

      <section class="dashboard">
        <div class="production">
          <h2>Seus <span>Investimentos</span></h2>
          <div class="cards">
            <div class="card add-card">
              <button class="big-add">+</button>
            </div>
          </div>
        </div>

        <div class="stats">
          <div class="stat-card">
            <p>Total em Bolsa de Valores</p>
            <h2>R$ 0,00</h2>
          </div>
        </div>
      </section>
    </section>

    <!-- RENDIMENTOS -->
    <section id="rendimentos" class="page">
      <h2>Rendimentos</h2>
      <p>Aqui aparecerão seus dividendos.</p>
    </section>

    <!-- CONTA -->
    <section id="conta" class="page">
      <h2>Minha Conta</h2>
      <p>Configurações do usuário.</p>
    </section>

  </main>
</div>

<script src="assets/js/script.js"></script>
</body>
</html>
