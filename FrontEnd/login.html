<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Investify</title>
  <link rel="stylesheet" href="assets/css/style.css"/>
  <link rel="stylesheet" href="assets/css/auth.css"/>
</head>
<body>
  <div class="login-container">
    <div class="login-sidebar">
      <div class="logo">Investify</div>
      <div class="divider"></div>
      <p class="sidebar-tagline">Organize seu portifolio de maneira.</p>
    </div>

    <div class="login-main">
      <div class="login-card">
        <h1>Bem-vindo <span>de volta</span></h1>
        <p>Entre para acessar sua carteira</p>

        <div id="erro" class="erro" style="display:none"></div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email"/>
        </div>

        <div class="form-group">
          <label for="password">Senha</label>
          <input type="password" id="password"/>
        </div>

        <button class="btn-login" onclick="login()">Entrar</button>

        <p class="signup-text">
          Não tem conta? <a href="register.html">Criar conta</a>
        </p>
      </div>
    </div>
  </div>

  <script>
    const API = "http://localhost:5227/api";

    // Se já estiver logado, vai direto pro app
    fetch(`${API}/auth/me`, { credentials: "include" })
      .then(r => { if (r.ok) window.location.href = "index.html"; });

    async function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const erro = document.getElementById("erro");

      const res = await fetch(`${API}/auth/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "include",
        body: JSON.stringify({ email, senha: password })
      });

      if (res.ok) {
        window.location.href = "index.html";
      } else {
        erro.textContent = "Email ou senha inválidos.";
        erro.style.display = "block";
      }
    }

    // Login ao apertar Enter
    document.addEventListener("keydown", e => {
      if (e.key === "Enter") login();
    });
  </script>
</body>
</html>
